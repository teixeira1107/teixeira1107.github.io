<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>货物汇总台账</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>货物汇总台账</h1>
        <p>微信群消息识别、货物别名归一、每日汇总</p>
      </div>
      <label class="date-field">
        <span>日期</span>
        <input id="workDate" type="date" />
      </label>
    </header>

    <nav class="view-nav" aria-label="页面导航">
      <button id="viewMainBtn" class="view-btn active" type="button">主页面</button>
      <button id="viewManageBtn" class="view-btn" type="button">二级菜单（管理）</button>
    </nav>

    <main class="layout">
      <section class="panel import-panel" data-view="main">
        <div class="panel-head">
          <h2>消息导入</h2>
          <div class="button-row">
            <button id="sampleBtn" class="ghost" type="button">示例</button>
            <button id="clearBtn" class="ghost" type="button">清空输入</button>
          </div>
        </div>
        <textarea
          id="rawText"
          spellcheck="false"
          placeholder="把微信群聊天内容粘贴到这里，例如：&#10;张三：苹果20箱，农夫山泉15件&#10;李四：王老板要鸡蛋30板&#10;赵五：洋芋 50斤"
        ></textarea>
        <div class="actions">
          <button id="parseBtn" class="primary" type="button">识别消息</button>
          <button id="addRowBtn" type="button">手动加一行</button>
        </div>
        <div class="wecom-sync">
          <input id="wecomBridgeUrl" type="text" placeholder="企业微信桥接地址，如：https://sloc-cn.workers.dev" />
          <button id="syncWecomBtn" type="button">微信同步入汇总</button>
        </div>
        <label class="wecom-auto-row">
          <input id="wecomAutoSync" type="checkbox" />
          <span>自动微信同步（每8秒）</span>
        </label>
      </section>

      <section class="panel image-panel" data-view="main">
        <div class="panel-head">
          <h2>截图识别</h2>
          <span id="ocrStatus" class="status-text">未选择图片</span>
        </div>
        <div id="dropZone" class="ocr-drop">
          <input id="imageInput" type="file" accept="image/*" multiple hidden />
          <button id="chooseImageBtn" type="button">选择截图</button>
          <p>表格截图会优先读取汇总表的商品和数量；普通截图会只保留命中货物词库且带数量的内容。</p>
        </div>
        <div class="ocr-settings">
          <label>
            <span>OCR 引擎</span>
            <select id="ocrProvider">
              <option value="online">在线 OCR（推荐）</option>
              <option value="local">本地 OCR</option>
            </select>
          </label>
          <label>
            <span>在线 API Key</span>
            <input id="ocrApiKey" type="text" placeholder="留空默认使用免费 key：helloworld" />
          </label>
          <label class="check-row">
            <input id="ocrStrictMode" type="checkbox" checked />
            <span>严格模式（有疑点就标红提醒）</span>
          </label>
          <label class="check-row">
            <input id="ocrDoubleCheck" type="checkbox" checked />
            <span>双引擎交叉校验（更慢但更稳）</span>
          </label>
        </div>
        <div id="imagePreview" class="image-preview"></div>
        <div id="ocrIssues" class="ocr-issues"></div>
        <textarea
          id="ocrText"
          spellcheck="false"
          placeholder="这里会只显示货物名称和数量，例如：土豆 50斤。可修改后再放入消息框"
        ></textarea>
        <div class="actions">
          <button id="ocrBtn" class="primary" type="button">识别图片</button>
          <button id="importStandardsBtn" type="button">导入标准名称（忽略价格）</button>
          <button id="appendOcrBtn" type="button">追加到消息框</button>
          <button id="replaceOcrBtn" type="button">替换消息框</button>
        </div>
      </section>

      <section class="panel summary-panel" data-view="main">
        <div class="panel-head">
          <h2>今日汇总</h2>
          <div class="button-row">
            <button id="clearDayBtn" class="ghost danger" type="button">清空今日记录</button>
            <button id="copyDailyBtn" type="button">复制日报</button>
            <button id="exportSummaryBtn" type="button">导出汇总</button>
          </div>
        </div>
        <div class="stat-grid">
          <div>
            <strong id="statItems">0</strong>
            <span>明细</span>
          </div>
          <div>
            <strong id="statProducts">0</strong>
            <span>货物</span>
          </div>
          <div>
            <strong id="statRules">0</strong>
            <span>规则</span>
          </div>
        </div>
        <div class="table-wrap summary-wrap">
          <table>
            <thead>
              <tr>
                <th>汇总货物名</th>
                <th class="num">数量</th>
                <th>单位</th>
                <th class="num">折算公斤</th>
                <th class="num">条数</th>
              </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel details-panel" data-view="manage">
        <div class="panel-head">
          <h2>识别明细</h2>
          <div class="button-row">
            <button id="applyRulesBtn" type="button">应用别名</button>
            <button id="exportDetailsBtn" type="button">导出明细</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="details-table">
            <thead>
              <tr>
                <th>发送人</th>
                <th>货物原称</th>
                <th>汇总货物名</th>
                <th class="num">数量</th>
                <th>单位</th>
                <th>备注</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="detailsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel compare-panel" data-view="manage">
        <div class="panel-head">
          <h2>对方汇总核对</h2>
          <div class="button-row">
            <button id="parseOtherBtn" class="primary" type="button">开始核对</button>
            <button id="copyCompareBtn" type="button">复制差异</button>
            <button id="exportCompareBtn" type="button">导出核对</button>
          </div>
        </div>
        <textarea
          id="otherText"
          spellcheck="false"
          placeholder="把对方微信里发来的汇总粘贴到这里，例如：&#10;苹果 20箱&#10;矿泉水 23件&#10;土豆 70斤"
        ></textarea>
        <div class="compare-stats">
          <span id="compareMatched">一致 0</span>
          <span id="compareDiff">差异 0</span>
          <span id="compareMissingMine">我方缺少 0</span>
          <span id="compareMissingOther">对方缺少 0</span>
        </div>
        <div class="table-wrap">
          <table class="compare-table">
            <thead>
              <tr>
                <th>状态</th>
                <th>货物</th>
                <th class="num">我方数量</th>
                <th class="num">对方数量</th>
                <th>单位</th>
                <th class="num">差额</th>
              </tr>
            </thead>
            <tbody id="compareBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel alias-panel" data-view="manage">
        <div class="panel-head">
          <h2>货物别名</h2>
          <div class="button-row">
            <button id="sanitizeDataBtn" class="ghost" type="button">按模板清理</button>
            <button id="resetRulesBtn" class="ghost" type="button">恢复内置模板</button>
          </div>
        </div>
        <div class="alias-form">
          <input id="newStandard" type="text" placeholder="最终汇总名，如：土豆" />
          <input id="newAliases" type="text" placeholder="别名，用逗号隔开，如：马铃薯, 洋芋" />
          <button id="addRuleBtn" type="button">添加规则</button>
        </div>
        <div class="alias-bulk">
          <textarea
            id="bulkRules"
            spellcheck="false"
            placeholder="批量导入格式：&#10;土豆|马铃薯,洋芋&#10;矿泉水|农夫山泉,怡宝,水&#10;去皮五花肉（热鲜）|去皮五花肉,五花肉去皮"
          ></textarea>
          <div class="button-row">
            <button id="importRulesBtn" type="button">批量导入</button>
            <button id="importTemplateCsvBtn" type="button">导入模板 CSV</button>
          </div>
          <input id="templateCsvInput" type="file" accept=".csv,text/csv" hidden />
          <p id="templateStatus" class="status-note"></p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>最终汇总名</th>
                <th>别名</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rulesBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel spec-panel" data-view="manage">
        <div class="panel-head">
          <h2>标准重量</h2>
        </div>
        <div class="spec-form">
          <input id="specStandard" type="text" placeholder="标准名，如：去皮五花肉（热鲜）" />
          <input id="specWeightKg" type="number" step="0.001" min="0" placeholder="每件公斤，如：10" />
          <input id="specUnits" type="text" placeholder="件单位，如：件,箱,包（按件时填写）" />
          <button id="addSpecBtn" type="button">添加规格</button>
        </div>
        <div class="spec-bulk">
          <textarea
            id="bulkSpecs"
            spellcheck="false"
            placeholder="批量导入格式（每行一条）：&#10;去皮五花肉（热鲜）|10|件&#10;带皮五花肉（热鲜）|15|件&#10;土豆|重量|斤,公斤"
          ></textarea>
          <button id="importSpecsBtn" type="button">批量导入规格</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>标准名</th>
                <th class="num">每件公斤</th>
                <th>件单位</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="specBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
    <script async src="https://cdn.jsdelivr.net/npm/tesseract.js@6.0.1/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
